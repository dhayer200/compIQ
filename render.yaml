services:
  - type: web
    name: compiq-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: USE_SEED_DATA
        value: "false"
      - key: PORT
        value: "8000"
